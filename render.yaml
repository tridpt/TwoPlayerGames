# Render.com Blueprint — deploy tự động từ repo GitHub
# Xem hướng dẫn ở DEPLOY.md
services:
  - type: web
    name: two-player-games
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
